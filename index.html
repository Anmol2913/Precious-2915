<!DOCTYPE html>
<html>
<head>
  <title>My Precious 💖</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at center, #2b0033, #000000);
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      color: white;
    }

    .glass-card {
      width: 360px;
      padding: 40px;
      border-radius: 25px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      text-align: center;
      box-shadow: 0 0 50px rgba(255,0,150,0.7);
      margin: 20px;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    h1,h3 {
      color: #ff99cc;
      text-shadow: 0 0 20px #ff0066;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(45deg, #ff4da6, #ff0066);
      color: white;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 15px #ff4da6;
    }

    input {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      text-align: center;
      outline: none;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: pink;
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- HOME -->
<div class="glass-card">
  <h1>Hey Precious 💎</h1>
  <p>✨ Tap below... something special is waiting for you 💖</p>
  <button onclick="start()">Tap Me 💌</button>
</div>

<div id="container"></div>

<script>

// particles
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(4+Math.random()*4)+"s";
  document.body.appendChild(p);
}

let step = 0;

function scrollToBottom(){
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}

function start(){
  addInput();
}

function addInput(){
  let div = document.createElement("div");
  div.className="glass-card";

  div.innerHTML = `
    <h3>🔐 Enter Secret Code</h3>
    <input type="text" id="input${step}" placeholder="Type here...">
    <br>
    <button onclick="check()">Unlock 💖</button>
  `;

  document.getElementById("container").appendChild(div);
  scrollToBottom();
}

function showMessage(text){
  let div = document.createElement("div");
  div.className="glass-card";
  div.innerHTML = text;
  document.getElementById("container").appendChild(div);
  scrollToBottom();
}

function check(){
  let value = document.getElementById(`input${step}`).value.toLowerCase();

  if(step===0 && value==="precious"){
    showMessage("💖 Hey Precious 💎<br><br>You are not just special ...<br>You are Precious ...<br>Your beautiful brown eyes ✨ feel like home,and your long hair flowing like magic 🌙 ❤️✨");
    step++;
    addInput();
  }

  else if(step===1 && value==="pooja"){
    showMessage("✨ 12 October 2024 ✨<br><br>A day that quietly changed everything for me ❤️🌙");
    step++;
    addInput();
  }

  else if(step===2 && value==="anmol"){
    showMessage("💫 Everything somehow leads back to one name...<br><br><span style='font-size:28px;color:#ff66cc;'>ANMOL 💎</span><br><br>The one who genuinely cares for you ❤️");
    step++;
    addInput();
  }

  else if(step===3 && value==="2915"){
    showMessage(`
      🎉✨ Wishing you all the very best 💖<br><br>

May your hard work shine through ✨<br>
in both your internal exams 📚<br>
and your final AKTU exams 🎓💫<br><br>

Believe in yourself 🌸<br>
Stay calm, stay confident 💖<br>
and keep smiling no matter what 😊✨<br><br>

<span style="color:#ff99cc;">With all my good wishes,</span><br>
<b style="font-size:20px;">Anmol </b>
    `);

    // glitter effect
    for(let i=0;i<80;i++){
      let g=document.createElement("div");
      g.className="particle";
      g.style.background="gold";
      g.style.width="4px";
      g.style.height="4px";
      g.style.left=Math.random()*100+"%";
      g.style.animationDuration=(2+Math.random()*3)+"s";
      document.body.appendChild(g);
    }

    step++;
  }

  else{
    alert("❌ Wrong code... try again 😜");
  }
}

</script>

</body>
</html>
