<!DOCTYPE html>
<html>
<head>
<title>Our Story 💖</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

.card{
  width:90%;
  max-width:400px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:pink;
}

/* GATES */
.gate{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background:black;
  z-index:999;
  transition:1s;
}
.left{left:0;}
.right{right:0;}
.openL{transform:translateX(-100%);}
.openR{transform:translateX(100%);}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  z-index:998;
}
.flash.active{
  animation:flash 0.8s;
}
@keyframes flash{
  0%{opacity:1;}
  100%{opacity:0;}
}

/* HEART */
.heart{
  position:fixed;
  animation:fall linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<h2>💖 Our Story 💖</h2>

<div class="gate left" id="leftGate"></div>
<div class="gate right" id="rightGate"></div>
<div class="flash" id="flash"></div>

<div id="container"></div>

<script>

let step=0;

let codes=[
"mulakat","anjaan","squishy",
"confession","memory","first blush","forever destination"
];

let stories=[
"📅 28 August 2024<br><br>Ek simple hello… aur story start hui ❤️",
"Strangers… but special 😄💬",
"Feelings real hone lagi ❤️",
"Wo 'yes' ek decision tha 💎",
"Same school… but late mile 💖",
"12 Oct… perfect day 💖🍦🎬",
"Ye kahani khatam nahi hogi ❤️"
];

// INPUT
function createInput(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
Enter Code<br>
<input id="input${step}">
<br>
<button onclick="check()">Unlock</button>
`;

container.appendChild(div);
}

// SHOW STORY
function showStory(text){
let div=document.createElement("div");
div.className="card";

typeEffect(div,text);

container.appendChild(div);
heartRain();
}

// TYPE EFFECT
function typeEffect(el,text){
let i=0;
let temp="";
function type(){
if(i<text.length){
temp+=text[i];
el.innerHTML=temp;
i++;
setTimeout(type,20);
}
}
type();
}

// CHECK
function check(){
let val=document.getElementById(`input${step}`).value.toLowerCase();

if(val===codes[step]){

flash.classList.add("active");

setTimeout(()=>{
leftGate.classList.add("openL");
rightGate.classList.add("openR");
},200);

setTimeout(()=>{
showStory(stories[step]);
step++;
if(step<codes.length) createInput();

setTimeout(()=>{
leftGate.classList.remove("openL");
rightGate.classList.remove("openR");
flash.classList.remove("active");
},1200);

},800);

}else{
alert("Wrong code 😜");
}
}

// HEART
function heartRain(){
for(let i=0;i<15;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"%";
h.style.fontSize="20px";
h.style.animationDuration="3s";
document.body.appendChild(h);
}
}

createInput();

</script>

</body>
</html>
